
```yaml
name: Render Quarto Report

on:
  schedule:
    - cron: '0 8 * * 1-5' # Elke ochtend om 08:00 (ma t/m vr)
  push:
    branches: main # Update ook meteen als jij de code aanpast

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          install.packages(c("tidyquant", "dplyr", "ggplot2", "zoo", "lubridate", "patchwork", "rmarkdown", "knitr"))
        shell: Rscript {0}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
